name: Build and publish stableOS

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Containerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Containerfile
          ignore: DL3041

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1

      - name: Install fish for syntax check
        run: sudo apt-get update && sudo apt-get install -y fish

      - name: Check fish config syntax
        run: fish --no-execute files/skel/.config/fish/config.fish

      - name: Parse config.toml
        run: python3 -c "import tomllib; tomllib.loads(open('config.toml').read())"

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build image with buildah
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./Containerfile
          image: stableos
          tags: test

      - name: Run image structure tests
        uses: GoogleContainerTools/container-structure-test-action@v2.1.1
        with:
          image: localhost/stableos:test
          config: container-structure-test.yaml

      - name: Login to GHCR
        uses: redhat-actions/podman-login@v1
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        uses: redhat-actions/push-to-registry@v2
        if: github.event_name != 'pull_request'
        with:
          image: stableos
          tags: latest ${{ github.sha }}
          registry: ghcr.io/nateinaction

    # Note: Image signing (cosign/sigstore) can be added in a future iteration.
