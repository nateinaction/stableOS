name: Build and publish stableOS

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# GitHub-hosted Linux runners ship podman preinstalled. Point the Makefile at
# it instead of the local download, which is not supported on Linux.
env:
  PODMAN: podman

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run pre-commit hooks
        run: make fmt

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # We need lots of disk space for the build, so clear the GitHub Actions runner cache to free up space.
      # Based on https://github.com/orgs/community/discussions/25678
      - name: Clear GitHub Actions runner cache
        run: rm -rf /opt/hostedtoolcache

      # Build with podman into containers-storage, matching local `make build`.
      # Always tag :latest so the structure tests have a stable ref to target;
      # :latest is only *published* to GHCR on main (see the push step below).
      - name: Build image
        run: |
          podman build \
            -f ./Containerfile \
            -t stableos:latest \
            -t "stableos:${{ github.sha }}" \
            .

      # container-structure-test's docker driver speaks the Docker API, but
      # podman ships a Docker-compatible socket. Point DOCKER_HOST at it so the
      # tests read the image straight from containers-storage -- the same path
      # used locally. This avoids copying into the runner's Docker daemon,
      # whose overlay2 driver caps images at 127 layers ("max depth exceeded").
      - name: Run container structure tests
        run: |
          podman system service --time=0 unix:///tmp/podman.sock &
          timeout 30 bash -c 'until [ -S /tmp/podman.sock ]; do sleep 0.5; done'
          export DOCKER_HOST=unix:///tmp/podman.sock
          make test-container-structure

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: stableos
          tags: latest ${{ github.sha }}
          registry: ghcr.io/nateinaction

      # bootc-image-builder-action wipes /var/lib/containers/storage and pulls
      # the image fresh as root, so it can't see our rootless-built image and a
      # bare name would resolve to docker.io. Pull the copy we just pushed to
      # GHCR by its fully-qualified name. This runs rootful (sudo podman), so
      # the rootless podman-login above doesn't apply -- log root in separately
      # so it can pull the (private) package. Gated to main because that's the
      # only time the image is pushed.
      - name: Log in to GHCR for rootful ISO build
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build ISO
        id: build-iso
        if: github.ref == 'refs/heads/main'
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: ./config.toml
          image: ghcr.io/nateinaction/stableos:${{ github.sha }}
          types: |
            iso

      - name: Upload Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iso
          path: ${{ steps.build-iso.outputs.output-directory }}
          if-no-files-found: error
