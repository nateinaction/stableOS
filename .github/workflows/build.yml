name: Build and publish stableOS

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# GitHub-hosted Linux runners ship podman preinstalled. Point the Makefile at
# it instead of the local download, which is not supported on Linux.
env:
  PODMAN: podman

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run pre-commit hooks
        run: make fmt

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          image: stableos
          tags: ${{ github.ref == 'refs/heads/main' && 'latest' || '' }} ${{ github.sha }}

      # buildah stores the image in podman's containers-storage, but
      # container-structure-test only supports the docker/tar drivers and our
      # suite needs command tests (docker driver). Copy the image into the
      # runner's Docker daemon so the test can find stableos:latest. The SHA
      # tag is always present; the latest tag is only applied on main.
      - name: Load image into Docker for structure tests
        run: podman push stableos:${{ github.sha }} docker-daemon:stableos:latest

      - name: Run container structure tests
        run: make test-container-structure

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: stableos
          tags: latest ${{ github.sha }}
          registry: ghcr.io/nateinaction

      - name: Build ISO
        id: build-iso
        uses: osbuild/bootc-image-builder-action@v0.0.2
        with:
          config-file: ./iso-config.toml
          image: stableos:${{ github.sha }}
          types: |
            iso

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iso
          path: ${{ steps.build-iso.outputs.output-directory }}
          if-no-files-found: error

