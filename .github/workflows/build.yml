name: Build and publish stableOS

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Weekly, to pick up base image security updates
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image with buildah
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./Containerfile
          image: stableos
          tags: latest ${{ github.sha }}
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        uses: redhat-actions/push-to-registry@v2
        if: github.event_name != 'pull_request'
        with:
          image: stableos
          tags: latest ${{ github.sha }}
          registry: ghcr.io/nateinaction

    # Note: Image signing (cosign/sigstore) can be added in a future iteration.
