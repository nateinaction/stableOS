name: Build and publish stableOS

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# GitHub-hosted Linux runners ship podman preinstalled. Point the Makefile at
# it instead of the local download, which is not supported on Linux.
env:
  PODMAN: podman

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run pre-commit hooks
        run: make fmt

  build:
    # Pin to 24.04: the rechunk step below runs rootful podman (podman mount),
    # which the rechunk action supports only on ubuntu-24.04, not -latest.
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Build with podman into containers-storage, matching local `make build`.
      # Always tag :latest so the structure tests have a stable ref to target;
      # :latest is only *published* to GHCR on main (see the push step below).
      - name: Build image
        run: |
          podman build \
            -f ./Containerfile \
            -t stableos:latest \
            -t "stableos:${{ github.sha }}" \
            .

      # container-structure-test's docker driver speaks the Docker API, but
      # podman ships a Docker-compatible socket. Point DOCKER_HOST at it so the
      # tests read the image straight from containers-storage -- the same path
      # used locally. This avoids copying into the runner's Docker daemon,
      # whose overlay2 driver caps images at 127 layers ("max depth exceeded").
      - name: Run container structure tests
        run: |
          podman system service --time=0 unix:///tmp/podman.sock &
          timeout 30 bash -c 'until [ -S /tmp/podman.sock ]; do sleep 0.5; done'
          export DOCKER_HOST=unix:///tmp/podman.sock
          make test-container-structure

      # Everything below runs on main only: rechunk the freshly built image into
      # deterministic, package-boundary-aligned layers so bootc update deltas stay
      # small, then publish the rechunked image. PRs stop after the tests above.

      # rechunk shells out to `sudo podman` and reads from ROOT container storage,
      # but the build above ran rootless. Copy the image into root storage so the
      # action's `sudo podman create <ref>` can find it.
      - name: Copy image into root storage for rechunk
        if: github.ref == 'refs/heads/main'
        run: podman save localhost/stableos:latest | sudo podman load

      # Repartition into equal-sized package chunks. `prev-ref` (the last published
      # image) keeps unchanged chunks byte-stable across builds; it is pulled by the
      # action's internal skopeo and is a public GHCR package, so no login is needed
      # here. rechunk strips the image config, so re-apply the Containerfile LABELs
      # (title/description/source) via `labels` and stamp a YYMMDD version.
      - name: Rechunk image
        if: github.ref == 'refs/heads/main'
        id: rechunk
        uses: hhd-dev/rechunk@5fbe1d3a639615d2548d83bc888360de6267b1a2 # v1.2.4
        with:
          ref: localhost/stableos:latest
          prev-ref: ghcr.io/nateinaction/stableos:latest
          rechunk: ghcr.io/hhd-dev/rechunk:v1.2.4
          version: "<date>"
          labels: |
            org.opencontainers.image.title=stableOS
            org.opencontainers.image.description=Custom Fedora bootc COSMIC desktop environment
            org.opencontainers.image.source=https://github.com/nateinaction/stableOS

      # The rechunk output is an OCI-layout dir (chowned back to the runner), not in
      # storage. Pull it back into rootless storage and re-tag it to the names the
      # push step expects, so we publish the rechunked image rather than the original.
      - name: Load rechunked image
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_ID=$(podman pull "${{ steps.rechunk.outputs.ref }}")
          podman tag "$IMAGE_ID" stableos:latest
          podman tag "$IMAGE_ID" "stableos:${{ github.sha }}"
          sudo rm -rf "${{ steps.rechunk.outputs.location }}"

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: stableos
          tags: latest ${{ github.sha }}
          registry: ghcr.io/nateinaction
