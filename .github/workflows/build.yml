name: Build and publish stableOS

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# GitHub-hosted Linux runners ship podman preinstalled. Point the Makefile at
# it instead of the local download, which is not supported on Linux.
env:
  PODMAN: podman

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - run: make fmt

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build image with buildah
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          image: stableos
          tags: ${{ github.ref == 'refs/heads/main' && 'latest' || '' }} ${{ github.sha }}

  test-container-structure:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - run: make test-container-structure

  iso:
    runs-on: ubuntu-latest
    needs: test-container-structure
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build installer ISO
        run: make output/bootiso/stableos.iso

      - name: Upload installer ISO
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stableos-install-iso
          path: output/bootiso/stableos.iso
          if-no-files-found: error
          retention-days: 14

  push:
    runs-on: ubuntu-latest
    needs: test-container-structure
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Login to GHCR
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: stableos
          tags: latest ${{ github.sha }}
          registry: ghcr.io/nateinaction

    # Note: Image signing (cosign/sigstore) can be added in a future iteration.
