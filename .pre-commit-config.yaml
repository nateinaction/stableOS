repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
    - id: check-json
    - id: check-toml
    - id: check-added-large-files

- repo: https://github.com/codespell-project/codespell
  rev: v2.4.1
  hooks:
    - id: codespell

- repo: local
  hooks:
    - id: lint-containerfile
      name: Lint Containerfile
      entry: make lint-containerfile
      language: system
      pass_filenames: false

    - id: lint-workflows
      name: Lint GitHub Actions workflows
      entry: make lint-workflows
      language: system
      pass_filenames: false

    - id: lint-fish
      name: Check fish config syntax
      entry: make lint-fish
      language: system
      pass_filenames: false
