# Enable flakes and the modern nix CLI (used by `nix develop` and per-project
# flake.nix dev environments). Flakes are on by default in the Fedora build, but
# we pin it explicitly. trusted-users lets the primary (wheel) user configure
# substituters and other settings.
experimental-features = nix-command flakes
trusted-users = root @wheel
max-jobs = auto
