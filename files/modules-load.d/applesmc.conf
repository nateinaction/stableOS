# Load the Apple SMC driver on MacBook hardware.
#
# applesmc drives the System Management Controller and exposes the keyboard
# backlight as an LED at /sys/class/leds/smc::kbd_backlight. It is not always
# auto-loaded because the ACPI device (APP0001) is not reliably matched, so the
# backlight LED never appears and the keys have no effect. Force-load it here.
applesmc
