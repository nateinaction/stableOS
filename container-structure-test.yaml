schemaVersion: '2.0.0'

metadataTest:
  labels:
    - key: title
      value: stableOS
    - key: description
      value: 'Custom Fedora bootc COSMIC desktop environment'

fileExistenceTests:
  - name: 'Flathub setup service exists'
    path: '/usr/lib/systemd/system/flathub-setup.service'
    shouldExist: true
  - name: 'applesmc module-load config exists'
    path: '/usr/lib/modules-load.d/applesmc.conf'
    shouldExist: true
  - name: 'cosign public key exists'
    path: '/etc/pki/containers/stableos.pub'
    shouldExist: true
  - name: 'container signature policy exists'
    path: '/etc/containers/policy.json'
    shouldExist: true
  - name: 'registries.d sigstore config exists'
    path: '/etc/containers/registries.d/ghcr.yaml'
    shouldExist: true
  - name: 'nix.conf exists'
    path: '/etc/nix/nix.conf'
    shouldExist: true
  - name: 'nix store bind-mount unit exists'
    path: '/usr/lib/systemd/system/nix.mount'
    shouldExist: true
  - name: 'nix-daemon mount-ordering drop-in exists'
    path: '/usr/lib/systemd/system/nix-daemon.service.d/10-nix-mount.conf'
    shouldExist: true
  - name: 'nix store-init oneshot exists'
    path: '/usr/lib/systemd/system/nix-store-init.service'
    shouldExist: true
  - name: 'nix-direnv direnvrc exists'
    path: '/usr/share/nix-direnv/direnvrc'
    shouldExist: true
  - name: 'nix bind-mount target directory exists'
    path: '/nix'
    shouldExist: true

fileContentTests:
  - name: 'cosign public key is a PEM public key'
    path: '/etc/pki/containers/stableos.pub'
    expectedContents: ['-----BEGIN PUBLIC KEY-----']
  - name: 'nix.conf enables flakes'
    path: '/etc/nix/nix.conf'
    expectedContents: ['nix-command flakes']

commandTests:
  - name: 'tailscale is installed'
    command: 'command'
    args: ['-v', 'tailscale']
    exitCode: 0
  - name: 'chezmoi is installed'
    command: 'command'
    args: ['-v', 'chezmoi']
    exitCode: 0
  - name: '1password is installed'
    command: 'command'
    args: ['-v', '1password']
    exitCode: 0
  - name: '1password cli (op) is installed'
    command: 'command'
    args: ['-v', 'op']
    exitCode: 0
  - name: 'nix is installed'
    command: 'command'
    args: ['-v', 'nix']
    exitCode: 0
  - name: 'direnv is installed'
    command: 'command'
    args: ['-v', 'direnv']
    exitCode: 0
  - name: 'broadcom wl kernel module is built'
    command: 'sh'
    args: ['-c', 'find /usr/lib/modules -name "wl.ko*" | grep -q .']
    exitCode: 0
  - name: 'tailscaled.service is enabled'
    command: 'systemctl'
    args: ['is-enabled', 'tailscaled.service']
    exitCode: 0
  - name: 'bootc-fetch-apply-updates.timer is enabled'
    command: 'systemctl'
    args: ['is-enabled', 'bootc-fetch-apply-updates.timer']
    exitCode: 0
  - name: 'flathub-setup.service is enabled'
    command: 'systemctl'
    args: ['is-enabled', 'flathub-setup.service']
    exitCode: 0
  - name: 'nix.mount is enabled'
    command: 'systemctl'
    args: ['is-enabled', 'nix.mount']
    exitCode: 0
  - name: 'nix-daemon.socket is enabled'
    command: 'systemctl'
    args: ['is-enabled', 'nix-daemon.socket']
    exitCode: 0
  - name: 'nix-daemon-socket SELinux module is installed'
    command: 'semodule'
    args: ['-l']
    expectedOutput: ['(?m)^nix-daemon-socket$']
    exitCode: 0
  - name: 'signature policy requires signing for the stableos repo'
    command: 'grep'
    args: ['-q', 'ghcr.io/nateinaction/stableos', '/etc/containers/policy.json']
    exitCode: 0
  - name: 'signature policy points at the baked-in cosign key'
    command: 'grep'
    args: ['-q', '/etc/pki/containers/stableos.pub', '/etc/containers/policy.json']
    exitCode: 0
  - name: 'firefox RPM is not installed'
    command: 'rpm'
    args: ['-q', 'firefox']
    exitCode: 1
