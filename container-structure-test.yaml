schemaVersion: '2.0.0'

metadataTest:
  labels:
    - key: title
      value: stableOS
    - key: description
      value: 'Custom Fedora bootc COSMIC desktop environment'

fileExistenceTests:
  - name: 'COSMIC skeleton config exists'
    path: '/etc/skel/.config/cosmic/shell.ron'
    shouldExist: true
  - name: 'Fish skeleton config exists'
    path: '/etc/skel/.config/fish/config.fish'
    shouldExist: true
  - name: 'Flathub setup service exists'
    path: '/usr/lib/systemd/system/flathub-setup.service'
    shouldExist: true
  - name: 'applesmc module-load config exists'
    path: '/usr/lib/modules-load.d/applesmc.conf'
    shouldExist: true

commandTests:
  - name: 'tailscale is installed'
    command: 'command'
    args: ['-v', 'tailscale']
    exitCode: 0
  - name: 'fish is installed'
    command: 'command'
    args: ['-v', 'fish']
    exitCode: 0
  - name: 'vim is installed'
    command: 'command'
    args: ['-v', 'vim']
    exitCode: 0
  - name: 'chezmoi is installed'
    command: 'command'
    args: ['-v', 'chezmoi']
    exitCode: 0
  - name: 'gh is installed'
    command: 'command'
    args: ['-v', 'gh']
    exitCode: 0
  - name: 'fzf is installed'
    command: 'command'
    args: ['-v', 'fzf']
    exitCode: 0
  - name: 'zoxide is installed'
    command: 'command'
    args: ['-v', 'zoxide']
    exitCode: 0
  - name: 'claude is installed'
    command: 'command'
    args: ['-v', 'claude']
  - name: 'alacritty is installed'
    command: 'command'
    args: ['-v', 'alacritty']
    exitCode: 0
  - name: 'warp-terminal is installed'
    command: 'command'
    args: ['-v', 'warp-terminal']
    exitCode: 0
  - name: '1password is installed'
    command: 'command'
    args: ['-v', '1password']
    exitCode: 0
  - name: 'broadcom wl kernel module is built'
    command: 'sh'
    args: ['-c', 'find /usr/lib/modules -name "wl.ko*" | grep -q .']
    exitCode: 0
  - name: 'fish is registered in /etc/shells'
    command: 'grep'
    args: ['-qx', '/usr/bin/fish', '/etc/shells']
    exitCode: 0
  - name: 'fish is the default shell for new users'
    command: 'grep'
    args: ['-qx', 'SHELL=/usr/bin/fish', '/etc/default/useradd']
    exitCode: 0
  - name: 'tailscaled.service is enabled'
    command: 'systemctl'
    args: ['is-enabled', 'tailscaled.service']
    exitCode: 0
  - name: 'bootc-fetch-apply-updates.timer is enabled'
    command: 'systemctl'
    args: ['is-enabled', 'bootc-fetch-apply-updates.timer']
    exitCode: 0
  - name: 'flathub-setup.service is enabled'
    command: 'systemctl'
    args: ['is-enabled', 'flathub-setup.service']
    exitCode: 0
